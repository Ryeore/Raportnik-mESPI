spring:
  application:
    name: raportnik
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/raportnik}
    username: ${SPRING_DATASOURCE_USERNAME:raportnik}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER:http://localhost:9000}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
ingestion:
  pap:
    base-url: https://espiebi.pap.pl/
    cron: "0 */5 * * * *"
